backend:
  name: git-gateway
  branch: main
media_folder: "images"
public_folder: "/images"
collections:
    - name: "images"
    label: "رفع الصور"
    folder: "images"
    create: true
    fields:
            - {label: "الصورة", name: "image", widget: "image"}
            - {label: "الاسم", name: "name", widget: "string"}
