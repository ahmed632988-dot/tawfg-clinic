<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدماتنا</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',Arial,sans-serif;background:#f8f9fa}
.container{max-width:1200px;margin:0 auto;padding:20px}
.page-header{background:#0d6efd;color:#fff;padding:60px 20px;text-align:center}
.page-header h1{font-size:36px;margin-bottom:10px}
.services{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px;margin:50px 0}
.service-card{background:#fff;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1);overflow:hidden;text-align:center;padding-bottom:20px}
.service-card img{width:100%;height:200px;object-fit:cover}
.service-card h3{color:#0d6efd;margin:15px 0 10px;font-size:22px}
.service-card p{color:#555;padding:0 15px;line-height:1.6}
.price{font-size:22px;font-weight:700;color:#28a745;margin:10px 0}
.btn{display:inline-block;padding:12px 30px;background:#0d6efd;color:#fff;text-decoration:none;border-radius:8px;margin-top:10px}
footer{background:#1a1a1a;color:#fff;text-align:center;padding:20px;margin-top:50px}
</style>
</head>
<body>

<div class="page-header">
  <h1 id="page-title">خدماتنا</h1>
  <p id="page-subtitle">نقدم لك أفضل الخدمات الطبية</p>
</div>

<div class="container">
  <div class="services" id="services-list">
    <!-- الخدمات بتظهر هنا تلقائياً من لوحة التحكم -->
  </div>
</div>

<footer>
  <p>جميع الحقوق محفوظة © 2026</p>
</footer>

<script>
fetch('/content/services.json')
.then(res => res.json())
.then(data => {
  document.getElementById('page-title').innerText = data.title;
  document.getElementById('page-subtitle').innerText = data.subtitle;
  
  let html = '';
  data.services.forEach(service => {
    html += `
    <div class="service-card">
      <img src="${service.image}" alt="${service.name}">
      <h3>${service.name}</h3>
      <p>${service.description}</p>
      <div class="price">${service.price}</div>
      <a href="#" class="btn">احجز الآن</a>
    </div>
    `;
  });
  document.getElementById('services-list').innerHTML = html;
});
</script>

</body>
</html>
